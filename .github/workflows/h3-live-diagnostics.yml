name: h3-live-diagnostics

on:
  push:
    branches:
      - 'h3-live-diagnostics/**'
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to run
        required: true
        default: linux
        type: choice
        options:
          - linux
          - windows
          - both
      repetitions:
        description: Number of times to repeat the H3 test group
        required: true
        default: "3"
        type: string
      test_scope:
        description: H3 tests to run
        required: true
        default: all
        type: choice
        options:
          - all
          - google
          - cloudflare
      rust_log:
        description: RUST_LOG filter for H3 diagnostics
        required: true
        default: "info,hickory_net::h3=debug,h3=debug,quinn=debug,quinn_proto=debug,quinn_udp=debug"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.platform || 'linux' }}
  cancel-in-progress: true

jobs:
  h3-live:
    name: h3 live (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.platform == 'both' && '["ubuntu-latest","windows-latest"]' || inputs.platform == 'windows' && '["windows-latest"]' || '["ubuntu-latest"]') }}
    env:
      RUST_BACKTRACE: "1"
      RUST_LOG: ${{ inputs.rust_log || 'info,hickory_net::h3=debug,h3=debug,quinn=debug,quinn_proto=debug,quinn_udp=debug' }}
      REPETITIONS: ${{ inputs.repetitions || '3' }}
      TEST_SCOPE: ${{ inputs.test_scope || 'all' }}
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Tool versions
        shell: bash
        run: |
          rustc --version
          cargo --version

      - name: Network diagnostics (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -x
          if command -v ip >/dev/null 2>&1; then
            ip addr
            ip route
          else
            echo "ip command is not installed"
          fi
          if command -v getent >/dev/null 2>&1; then
            getent hosts dns.google || true
          else
            echo "getent command is not installed"
          fi
          if command -v ping >/dev/null 2>&1; then
            ping -c 1 -W 1 8.8.8.8 || true
          else
            echo "ping command is not installed"
          fi

      - name: Network diagnostics (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ipconfig /all
          route print
          Resolve-DnsName dns.google -ErrorAction Continue
          Test-NetConnection dns.google -Port 443

      - name: Run H3 client stream tests
        shell: bash
        run: |
          set -uo pipefail

          mkdir -p h3-live-logs
          failed=0
          attempt=1

          case "${TEST_SCOPE}" in
            all)
              TEST_FILTERS=(h3::h3_client_stream)
              ;;
            google)
              TEST_FILTERS=(
                h3::h3_client_stream::tests::test_h3_google
                h3::h3_client_stream::tests::test_h3_client_stream_clonable
              )
              ;;
            cloudflare)
              TEST_FILTERS=(h3::h3_client_stream::tests::test_h3_cloudflare)
              ;;
            *)
              echo "::error::unknown TEST_SCOPE: ${TEST_SCOPE}"
              exit 2
              ;;
          esac

          echo "test scope: ${TEST_SCOPE}"
          printf "test filters:"
          printf " %s" "${TEST_FILTERS[@]}"
          printf "\n"

          while [ "${attempt}" -le "${REPETITIONS}" ]; do
            log="h3-live-logs/${RUNNER_OS}-attempt-${attempt}.log"
            echo "attempt ${attempt}/${REPETITIONS}: start (${log})"
            : >"${log}"
            attempt_failed=0

            for test_filter in "${TEST_FILTERS[@]}"; do
              echo "filter: ${test_filter}" >>"${log}"
              echo "rust_log: ${RUST_LOG}" >>"${log}"

              if cargo test \
                --quiet \
                --locked \
                -p hickory-net \
                --features h3-ring,webpki-roots \
                "${test_filter}" \
                -- --nocapture \
                >>"${log}" 2>&1; then
                :
              else
                status=$?
                attempt_failed=${status}
              fi
            done

            grep -E "test result:" "${log}" || true
            if [ "${attempt_failed}" -eq 0 ]; then
              echo "attempt ${attempt}/${REPETITIONS}: ok"
            else
              failed=1
              echo "::error::attempt ${attempt}/${REPETITIONS} failed with status ${attempt_failed}; full output is in ${log}"
              grep -E "test result:|failures:|h3 connect failed|panicked at" "${log}" || true
              echo "last 200 log lines from ${log}:"
              tail -n 200 "${log}" || true
            fi

            attempt=$((attempt + 1))
          done

          exit "${failed}"

      - name: Upload H3 logs
        if: always() && !env.ACT
        uses: actions/upload-artifact@v4
        with:
          name: h3-live-${{ runner.os }}-${{ github.run_attempt }}
          path: h3-live-logs/
