[package]
name = "hickory-proto"

# A short blurb about the package. This is not rendered in any format when
# uploaded to crates.io (aka this is not markdown)
description = """
Hickory DNS is a safe and secure DNS library. This is the foundational DNS protocol library for all Hickory DNS projects.
"""

# These URLs point to more information about the repository
documentation = "https://docs.rs/hickory-proto"

# This points to a file in the repository (relative to this Cargo.toml). The
# contents of this file are stored and indexed in the registry.
readme = "README.md"

version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true

[features]
std = [
    "data-encoding/std",
    "futures-channel/std",
    "futures-io/std",
    "futures-util/std",
    "ipnet/std",
    "rand/std",
    "rand/thread_rng",
    "ring/std",
    "thiserror/std",
    "tracing-subscriber/env-filter",
    "tracing-subscriber/fmt",
    "tracing-subscriber/std",
    "tracing/std",
    "url/std",
]

dns-over-tls = ["std"]
dns-over-rustls = [
    "dns-over-tls",
    "rustls/ring",
    "std",
    "dep:tokio-rustls",
    "tokio-runtime",
]

dns-over-https-rustls = ["std", "dep:bytes", "dep:h2", "dep:http", "dns-over-rustls", "tokio-runtime"]
dns-over-quic = [
    "std",
    "dep:quinn",
    "dns-over-rustls",
    "dep:bytes",
    "dep:pin-project-lite",
    "tokio-runtime",
]
dns-over-h3 = ["std", "dep:h3", "dep:h3-quinn", "dep:quinn", "dep:http", "dns-over-quic"]

rustls-platform-verifier = ["std", "dep:rustls-platform-verifier"]

dnssec-ring = ["std", "dep:bitflags", "dep:ring", "dep:rustls-pki-types", "dep:time"]
testing = []

text-parsing = ["std"]
tokio-runtime = ["std", "tokio/net", "tokio/rt", "tokio/time", "tokio/rt-multi-thread"]
default = ["std", "tokio-runtime"]

serde = ["dep:serde", "url/serde"]

# enables experimental the mDNS (multicast) feature
mdns = ["socket2/all", "std"]

wasm-bindgen = ["dep:wasm-bindgen-crate", "dep:js-sys"]

backtrace = ["std", "dep:backtrace"]

[lib]
name = "hickory_proto"
path = "src/lib.rs"

[dependencies]
async-recursion.workspace = true
async-trait.workspace = true
backtrace = { workspace = true, optional = true }
bitflags = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }
cfg-if.workspace = true
critical-section = { workspace = true }
data-encoding = { workspace = true, features = ["alloc"] }
enum-as-inner.workspace = true
futures-channel = { workspace = true, default-features = false, features = ["alloc"] }
futures-io = { workspace = true, default-features = false, optional = true }
futures-util = { workspace = true, default-features = false, features = ["alloc"] }
h2 = { workspace = true, features = ["stream"], optional = true }
h3 = { workspace = true, optional = true }
h3-quinn = { workspace = true, optional = true }
http = { workspace = true, optional = true }
idna.workspace = true
ipnet.workspace = true
js-sys = { workspace = true, optional = true }
once_cell = { workspace = true, features = ["critical-section"] }
pin-project-lite = { workspace = true, optional = true }
quinn = { workspace = true, optional = true, features = ["log", "runtime-tokio", "rustls"] }
rand = { workspace = true, features = ["std_rng"] }
ring = { workspace = true, optional = true, features = ["std"] }
rustls = { workspace = true, optional = true, default-features = false }
rustls-pki-types = { workspace = true, optional = true }
rustls-platform-verifier = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
socket2 = { workspace = true, optional = true }
thiserror.workspace = true
time = { workspace = true, optional = true }
tinyvec = { workspace = true, features = ["alloc"] }
tracing = { workspace = true, default-features = false }
tokio = { workspace = true, features = ["io-util", "macros"], optional = true }
tokio-rustls = { workspace = true, optional = true, features = ["early-data"] }
url = { workspace = true }
wasm-bindgen-crate = { workspace = true, optional = true }
webpki-roots = { workspace = true, optional = true }

[dev-dependencies]
futures-executor = { workspace = true, default-features = false, features = ["std"] }
test-support.workspace = true
tokio = { workspace = true, features = ["rt", "time", "macros"] }
tracing-subscriber.workspace = true

[package.metadata.docs.rs]
all-features = true
default-target = "x86_64-unknown-linux-gnu"
targets = ["x86_64-apple-darwin", "x86_64-pc-windows-msvc"]
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[package.metadata.cargo-all-features]
skip_optional_dependencies = true
max_combination_size = 2
